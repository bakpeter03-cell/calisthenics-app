<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-tertiary": "#ffffff",
            "surface-container-high": "#e6e8ea",
            "on-secondary": "#ffffff",
            "background": "#f8f9fb",
            "on-background": "#191c1e",
            "on-tertiary-fixed-variant": "#842225",
            "surface-tint": "#006c49",
            "on-secondary-fixed-variant": "#004395",
            "on-primary-fixed": "#002113",
            "tertiary-fixed-dim": "#ffb3af",
            "surface-variant": "#e0e3e5",
            "inverse-surface": "#2d3133",
            "primary-fixed": "#6ffbbe",
            "on-secondary-fixed": "#001a42",
            "inverse-primary": "#4edea3",
            "secondary-container": "#2170e4",
            "on-primary-fixed-variant": "#005236",
            "on-surface-variant": "#3c4a42",
            "primary": "#006c49",
            "surface-container-lowest": "#ffffff",
            "outline-variant": "#bbcabf",
            "tertiary": "#a43a3a",
            "surface-container-low": "#f2f4f6",
            "primary-fixed-dim": "#4edea3",
            "surface-dim": "#d8dadc",
            "tertiary-container": "#fc7c78",
            "primary-container": "#10b981",
            "surface": "#f8f9fb",
            "inverse-on-surface": "#eff1f3",
            "surface-container": "#eceef0",
            "secondary-fixed-dim": "#adc6ff",
            "on-error": "#ffffff",
            "on-surface": "#191c1e",
            "on-error-container": "#93000a",
            "error-container": "#ffdad6",
            "surface-container-highest": "#e0e3e5",
            "error": "#ba1a1a",
            "tertiary-fixed": "#ffdad7",
            "on-primary": "#ffffff",
            "on-tertiary-fixed": "#410005",
            "on-primary-container": "#00422b",
            "on-secondary-container": "#fefcff",
            "on-tertiary-container": "#711419",
            "outline": "#6c7a71",
            "secondary-fixed": "#d8e2ff",
            "surface-bright": "#f8f9fb",
            "secondary": "#0058be"
          },
          fontFamily: {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .tabular-nums {
      font-variant-numeric: tabular-nums;
    }
    .glass-header {
      backdrop-filter: blur(20px);
      background-color: rgba(248, 249, 251, 0.8);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm dark:shadow-none h-16 px-6 flex justify-between items-center">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400" style="">menu</span>
</div>
<h1 class="font-inter tracking-tight font-black uppercase text-xl text-slate-900 dark:text-slate-50" style="">KINETIC</h1>
<div class="w-8 h-8 rounded-full bg-surface-container-highest overflow-hidden">
<img alt="Profile" class="" data-alt="portrait of a focused athletic man in minimalist fitness apparel with neutral studio lighting and clean background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA9kdOFH3FvTr9BgNN2jocyFsQqgg99x4pesjxVfAEve6TRI85ckpFo_EPwoxZjtVGJ0BJCdMl2D_1VlSdlvNo7Q5acepiPvHilavoryN6oYJVOnXDXHaGGxlIorM8Z7xF6RvybDkRyQZ7_Nq7kceXaB-6P2EUkap-c7AUm5z66MMVvNFqOnvAuqS9YbovKpY9f05puVfQLzGMOpdHHhsblg7aeM7MEjO8zNUtQFN0Vrikht9NelpVC4fJ_fpc2S6xb63yqogZFvu4" style="">
</div>
</header>
<main class="pt-20 px-4 md:px-8 max-w-2xl mx-auto space-y-8">
<!-- Pulse Rest Timer Card -->
<section class="bg-surface-container-low rounded-xl p-8 flex flex-col items-center justify-center relative overflow-hidden group">
<div class="absolute inset-0 opacity-5 pointer-events-none">
<div class="w-full h-full bg-gradient-to-tr from-primary to-transparent"></div>
</div>
<div class="relative z-10 text-center">
<span class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 block" style="">Rest Timer</span>
<div class="text-[5rem] font-black tabular-nums tracking-tighter leading-none text-on-surface" style="">
          00:00
        </div>
<div class="flex gap-4 mt-8">
<button class="bg-surface-container-lowest text-on-surface px-6 py-2 rounded-xl font-bold transition-all active:scale-95 shadow-sm" style="">
            Reset
          </button>
<button class="bg-primary-container text-on-primary-container px-10 py-2 rounded-xl font-black uppercase tracking-wider transition-all active:scale-95 shadow-[0_12px_32px_rgba(25,28,30,0.06)]" style="">
            Start
          </button>
<button class="bg-surface-container-lowest text-error px-6 py-2 rounded-xl font-bold transition-all active:scale-95 shadow-sm" style="">
            Stop
          </button>
</div>
</div>
</section>
<!-- Category Selector -->
<nav class="flex justify-between gap-2 overflow-x-auto pb-2 scrollbar-hide">
<button class="flex-1 bg-primary text-on-primary py-3 px-4 rounded-xl font-bold text-center transition-all duration-200" style="">
        Push
      </button>
<button class="flex-1 bg-transparent border border-outline-variant/30 text-on-surface-variant py-3 px-4 rounded-xl font-bold text-center hover:bg-surface-container-low transition-all duration-200" style="">
        Pull
      </button>
<button class="flex-1 bg-transparent border border-outline-variant/30 text-on-surface-variant py-3 px-4 rounded-xl font-bold text-center hover:bg-surface-container-low transition-all duration-200" style="">
        Legs
      </button>
<button class="flex-1 bg-transparent border border-outline-variant/30 text-on-surface-variant py-3 px-4 rounded-xl font-bold text-center hover:bg-surface-container-low transition-all duration-200" style="">
        Core
      </button>
</nav>
<!-- Input Form -->
<section class="bg-surface-container-lowest rounded-xl p-6 shadow-sm space-y-6">
<div class="space-y-4">
<div class="relative group">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-1 ml-1" style="">Exercise</label>
<select class="w-full bg-surface-container-low border-0 border-l-2 border-transparent focus:border-secondary rounded-xl px-4 py-3 appearance-none focus:ring-0 text-on-surface font-medium transition-all">
<option>Muscle Up</option>
<option>Handstand Pushup</option>
<option>Dips (Weighted)</option>
<option>Planche Lean</option>
</select>
<div class="absolute right-4 bottom-3 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined" style="">expand_more</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="group">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-1 ml-1" style="">Weight</label>
<input class="w-full bg-surface-container-low border-0 border-l-2 border-transparent focus:border-secondary rounded-xl px-4 py-3 focus:ring-0 text-on-surface font-medium" placeholder="0" type="number">
</div>
<div class="group">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-1 ml-1" style="">Reps</label>
<input class="w-full bg-surface-container-low border-0 border-l-2 border-transparent focus:border-secondary rounded-xl px-4 py-3 focus:ring-0 text-on-surface font-medium" placeholder="0" type="number">
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="group">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-1 ml-1" style="">Static Hold (sec)</label>
<input class="w-full bg-surface-container-low border-0 border-l-2 border-transparent focus:border-secondary rounded-xl px-4 py-3 focus:ring-0 text-on-surface font-medium" placeholder="0" type="number">
</div>
<div class="group">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-1 ml-1" style="">Rest (sec)</label>
<input class="w-full bg-surface-container-low border-0 border-l-2 border-transparent focus:border-secondary rounded-xl px-4 py-3 focus:ring-0 text-on-surface font-medium" placeholder="90" type="number">
</div>
</div>
</div>
<button class="w-full bg-secondary-container text-on-secondary-container py-4 rounded-xl font-black uppercase tracking-widest shadow-lg shadow-secondary/20 active:scale-95 transition-all" style="">
        Save Set
      </button>
</section>
<!-- Today's Sets -->
<section class="space-y-4">
<div class="flex justify-between items-end px-2">
<h2 class="font-headline text-lg font-black text-on-surface tracking-tight uppercase" style="">Today's Workout</h2>
<span class="font-label text-[10px] font-bold text-primary tracking-widest uppercase" style="">4 Total</span>
</div>
<div class="space-y-3">
<!-- Log Item 1 -->
<div class="bg-surface-container-lowest p-4 rounded-xl flex items-center justify-between group transition-all hover:translate-x-1">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center text-on-primary-fixed">
<span class="font-black text-xs" style="">1</span>
</div>
<div>
<p class="font-headline text-sm font-bold text-on-surface" style="">Muscle Up</p>
<p class="font-label text-[10px] font-bold text-on-surface-variant uppercase tracking-wider" style="">8 Reps • Bodyweight</p>
</div>
</div>
<div class="flex items-center gap-4">
<span class="text-xs font-bold text-on-surface-variant tabular-nums" style="">09:12 AM</span>
<button class="text-error/40 hover:text-error transition-colors p-1" style="">
<span class="material-symbols-outlined text-lg" style="">delete</span>
</button>
</div>
</div>
<!-- Log Item 2 -->
<div class="bg-surface-container-lowest p-4 rounded-xl flex items-center justify-between group transition-all hover:translate-x-1">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center text-on-primary-fixed">
<span class="font-black text-xs" style="">2</span>
</div>
<div>
<p class="font-headline text-sm font-bold text-on-surface" style="">Muscle Up</p>
<p class="font-label text-[10px] font-bold text-on-surface-variant uppercase tracking-wider" style="">6 Reps • +5kg</p>
</div>
</div>
<div class="flex items-center gap-4">
<span class="text-xs font-bold text-on-surface-variant tabular-nums" style="">09:18 AM</span>
<button class="text-error/40 hover:text-error transition-colors p-1" style="">
<span class="material-symbols-outlined text-lg" style="">delete</span>
</button>
</div>
</div>
<!-- Log Item 3 (Asymmetric Highlight) -->
<div class="bg-primary-fixed/30 border-l-4 border-primary p-4 rounded-xl flex items-center justify-between group transition-all hover:translate-x-1">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container">
<span class="font-black text-xs" style="">3</span>
</div>
<div>
<p class="font-headline text-sm font-bold text-on-surface" style="">Dips</p>
<p class="font-label text-[10px] font-bold text-on-surface-variant uppercase tracking-wider" style="">12 Reps • +20kg</p>
</div>
</div>
<div class="flex items-center gap-4">
<span class="text-xs font-bold text-on-surface-variant tabular-nums" style="">09:25 AM</span>
<button class="text-error/40 hover:text-error transition-colors p-1" style="">
<span class="material-symbols-outlined text-lg" style="">delete</span>
</button>
</div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 pb-safe bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-[0_-12px_32px_rgba(25,28,30,0.06)] h-20 flex justify-around items-center px-4">
<a class="flex flex-col items-center justify-center text-emerald-600 dark:text-emerald-400 scale-110 transition-transform" href="#" style="">
<span class="material-symbols-outlined" data-weight="fill" style="">fitness_center</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-widest mt-1" style="">Workout</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-emerald-500 dark:hover:text-emerald-300" href="#" style="">
<span class="material-symbols-outlined" style="">leaderboard</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-widest mt-1" style="">Analytics</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-emerald-500 dark:hover:text-emerald-300" href="#" style="">
<span class="material-symbols-outlined" style="">assistant</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-widest mt-1" style="">Chat</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-emerald-500 dark:hover:text-emerald-300" href="#" style="">
<span class="material-symbols-outlined" style="">inventory_2</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-widest mt-1" style="">History</span>
</a>
</nav>
</body></html>
