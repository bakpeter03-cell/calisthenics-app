<!doctype html>
<html lang="en" class="light">
  <head>

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CALI Tracker</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

        tailwind.config = {

                        "background": "#f8f9fb",

                        "on-secondary-fixed": "#001a42",
                        "inverse-primary": "#4edea3",
                        "secondary-container": "#2170e4",
                        "on-primary-fixed-variant": "#005236",
                        "on-surface-variant": "#3c4a42",
                        "primary": "#006c49",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#bbcabf",
                        "tertiary": "#a43a3a",
                        "surface-container-low": "#f2f4f6",
                        "primary-fixed-dim": "#4edea3",
                        "surface-dim": "#d8dadc",
                        "tertiary-container": "#fc7c78",
                        "primary-container": "#10b981",

                        "secondary-fixed-dim": "#adc6ff",

                        "on-tertiary-container": "#711419",
                        "outline": "#6c7a71",
                        "secondary-fixed": "#d8e2ff",
                        "surface-bright": "#f8f9fb",
                        "secondary": "#0058be"

                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "inter": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }
        .glass-header {
            backdrop-filter: blur(20px);
            background-color: rgba(248, 249, 251, 0.8);
        }
        body {
            min-height: max(884px, 100dvh);
            background-color: #f8f9fb;
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .chart-grid { background-image: radial-gradient(circle, #e0e3e5 1px, transparent 1px); background-size: 24px 24px; }
    </style>
  </head>
  <body class="bg-surface font-body text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed antialiased min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
